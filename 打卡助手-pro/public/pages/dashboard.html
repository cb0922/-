<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析 - 小打卡 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        /* 内容区 */
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .stat-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
        }
        
        .stat-change {
            font-size: 13px;
            margin-top: 4px;
        }
        
        .stat-change.up {
            color: #10b981;
        }
        
        .stat-change.down {
            color: #ef4444;
        }
        
        /* 图表区 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        /* 习惯列表 */
        .habits-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
        }
        
        .habit-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .habit-item:last-child {
            border-bottom: none;
        }
        
        .habit-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            color: white;
        }
        
        .habit-info {
            flex: 1;
        }
        
        .habit-name {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }
        
        .habit-meta {
            font-size: 13px;
            color: #6b7280;
        }
        
        .habit-stats {
            text-align: right;
        }
        
        .habit-count {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }
        
        .habit-rate {
            font-size: 12px;
            color: #6b7280;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header {
                padding: 16px;
            }
            .content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h1 class="header-title">数据分析</h1>
            </div>
        </div>
    </header>

    <main class="content">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总积分</div>
                <div class="stat-value" id="totalPoints">-</div>
                <div class="stat-change up">↑ 持续增长中</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">连续打卡</div>
                <div class="stat-value" id="continuousDays">-</div>
                <div class="stat-change up">保持好习惯</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总打卡次数</div>
                <div class="stat-value" id="totalCheckins">-</div>
                <div class="stat-change up">↑ 累计坚持</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">活跃习惯</div>
                <div class="stat-value" id="activeHabits">-</div>
                <div class="stat-change">正在养成中</div>
            </div>
        </div>

        <!-- 图表区 -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3 class="chart-title">📈 打卡趋势（最近7天）</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">🥧 习惯分布</h3>
                <div class="chart-container">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 习惯详情 -->
        <div class="habits-section">
            <h3 class="section-title">习惯完成情况</h3>
            <div id="habitsList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        // 检查登录
        if (!API.utils.isLoggedIn()) {
            window.location.href = '/login';
        }

        let trendChart, distributionChart;

        // 加载数据
        async function loadDashboardData() {
            try {
                // 加载仪表盘数据
                const dashboardRes = await API.analytics.getDashboard();
                const data = dashboardRes.data;

                // 更新统计卡片
                document.getElementById('totalPoints').textContent = data.user.total_points || 0;
                document.getElementById('continuousDays').textContent = (data.user.continuous_days || 0) + '天';
                document.getElementById('totalCheckins').textContent = data.user.total_checkins || 0;
                document.getElementById('activeHabits').textContent = data.active_habits || 0;

                // 渲染趋势图
                renderTrendChart(data.weekly_trend);

                // 渲染分布图
                renderDistributionChart(data.habit_completion);

                // 渲染习惯列表
                renderHabitsList(data.habit_completion);

            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('habitsList').innerHTML = '<p style="text-align:center;color:#6b7280;">加载失败，请刷新重试</p>';
            }
        }

        // 渲染趋势图
        function renderTrendChart(trendData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            const dates = trendData.map(d => d.checkin_date.slice(5));
            const counts = trendData.map(d => d.checkins);

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '打卡次数',
                        data: counts,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        // 渲染分布图
        function renderDistributionChart(habits) {
            const ctx = document.getElementById('distributionChart').getContext('2d');
            
            const labels = habits.map(h => h.name);
            const data = habits.map(h => h.completed_days || 0);
            const colors = habits.map(h => h.color || '#667eea');

            distributionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                usePointStyle: true,
                                padding: 15
                            }
                        }
                    }
                }
            });
        }

        // 渲染习惯列表
        function renderHabitsList(habits) {
            const container = document.getElementById('habitsList');
            
            if (!habits || habits.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#6b7280;padding:40px;">暂无习惯数据</p>';
                return;
            }

            container.innerHTML = habits.map(habit => `
                <div class="habit-item">
                    <div class="habit-icon" style="background: ${habit.color};">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            ${getIconSvg(habit.icon)}
                        </svg>
                    </div>
                    <div class="habit-info">
                        <div class="habit-name">${habit.name}</div>
                        <div class="habit-meta">30天内完成 ${habit.completed_days || 0} 天</div>
                    </div>
                    <div class="habit-stats">
                        <div class="habit-count">${habit.total_checkins || 0}</div>
                        <div class="habit-rate">总打卡</div>
                    </div>
                </div>
            `).join('');
        }

        function getIconSvg(icon) {
            const icons = {
                star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>',
                book: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>',
                sun: '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>',
                activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
                moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>',
                heart: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>',
                default: '<circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path>'
            };
            return icons[icon] || icons.default;
        }

        // 页面加载完成后加载数据
        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
