<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志查询 - 松鼠打卡</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        /* 内容区 */
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 筛选区 */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 14px;
            color: #6b7280;
        }
        
        .filter-select, .filter-input {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        /* 日志列表 */
        .log-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        .log-header {
            display: grid;
            grid-template-columns: 180px 100px 120px 1fr 160px;
            gap: 16px;
            padding: 16px 20px;
            background: #f9fafb;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        
        .log-item {
            display: grid;
            grid-template-columns: 180px 100px 120px 1fr 160px;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 14px;
            color: #4b5563;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #6b7280;
            font-size: 13px;
        }
        
        .log-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .log-type.create {
            background: #d1fae5;
            color: #065f46;
        }
        
        .log-type.update {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .log-type.delete {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .log-type.login {
            background: #ede9fe;
            color: #5b21b6;
        }
        
        .log-type.checkin {
            background: #fef3c7;
            color: #92400e;
        }
        
        .log-user {
            color: #1f2937;
            font-weight: 500;
        }
        
        .log-content {
            color: #4b5563;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 20px;
        }
        
        .page-btn {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .page-btn:hover:not(:disabled) {
            border-color: #667eea;
            color: #667eea;
        }
        
        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 加载 */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .log-header, .log-item {
                grid-template-columns: 140px 80px 1fr 120px;
            }
            .log-header > :nth-child(3),
            .log-item > :nth-child(3) {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .log-header, .log-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .log-header {
                display: none;
            }
            .log-item {
                padding: 16px;
            }
            .filter-bar {
                flex-direction: column;
            }
            .filter-group {
                width: 100%;
            }
            .filter-select, .filter-input {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 32px; height: 32px;">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <span>松鼠打卡</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">主要功能</div>
                <div class="nav-item" data-page="dashboard" onclick="navigateTo('dashboard')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>首页概览</span>
                </div>
                <div class="nav-item" data-page="study" onclick="navigateTo('study')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    </svg>
                    <span>学习计划</span>
                </div>
                <div class="nav-item" data-page="habit" onclick="navigateTo('habit')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>行为习惯</span>
                </div>
                <div class="nav-item" data-page="stats" onclick="navigateTo('stats')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span>数据统计</span>
                </div>
            </div>
            
            <div class="nav-section">
                <div class="nav-section-title">更多功能</div>
                <div class="nav-item" data-page="pet" onclick="navigateTo('pet')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <path d="M12 2c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6-.5 0-1-.2-1.4-.6-.4-.4-.6-.9-.6-1.4 0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"></path>
                        <path d="M8 9c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2V9z"></path>
                        <path d="M4 14c0-1.1.9-2 2-2"></path>
                        <path d="M20 14c0-1.1-.9-2-2-2"></path>
                    </svg>
                    <span>电子宠物</span>
                </div>
                <div class="nav-item active" data-page="logs" onclick="navigateTo('logs')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <span>使用日志</span>
                </div>
                <div class="nav-item" data-page="help" onclick="navigateTo('help')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span>使用帮助</span>
                </div>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-menu-mini" onclick="toggleUserMenu()">
                <div class="user-avatar-mini">用</div>
                <div class="user-info-mini">
                    <div class="user-name-mini">测试用户</div>
                    <div class="user-role-mini">普通用户</div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>
    </aside>

    <!-- 主内容区域 -->
    <div class="main-wrapper">
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <button class="back-btn" onclick="window.location.href='/'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h1 class="header-title">日志查询</h1>
                </div>
            </div>
        </header>

        <main class="content">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('system')">系统日志</button>
                <button class="tab" onclick="switchTab('login')">登录日志</button>
            </div>

            <!-- 筛选区 -->
            <div class="filter-bar">
                <div class="filter-group">
                    <span class="filter-label">操作类型:</span>
                    <select class="filter-select" id="actionFilter">
                        <option value="">全部</option>
                        <option value="create_habit">创建习惯</option>
                        <option value="update_habit">更新习惯</option>
                        <option value="delete_habit">删除习惯</option>
                        <option value="checkin">打卡</option>
                        <option value="login">登录</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">开始日期:</span>
                    <input type="date" class="filter-input" id="startDate">
                </div>
                <div class="filter-group">
                    <span class="filter-label">结束日期:</span>
                    <input type="date" class="filter-input" id="endDate">
                </div>
                <div class="filter-group" style="margin-left: auto;">
                    <button class="btn btn-primary" onclick="loadLogs()">查询</button>
                    <button class="btn btn-secondary" onclick="resetFilter()">重置</button>
                </div>
            </div>

            <!-- 日志列表 -->
            <div class="log-list" id="logList">
                <div class="log-header">
                    <span>时间</span>
                    <span>类型</span>
                    <span>用户</span>
                    <span>内容</span>
                    <span>IP地址</span>
                </div>
                <div id="logContent">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <!-- 动态生成分页 -->
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // 检查登录
        if (!API.utils.isLoggedIn()) {
            window.location.href = '/login';
        }

        let currentTab = 'system';
        let currentPage = 1;
        let totalPages = 1;

        // 侧边栏导航功能
        function navigateTo(page) {
            // 页面跳转逻辑
            switch(page) {
                case 'dashboard':
                    window.location.href = '/';
                    break;
                case 'study':
                    window.location.href = '/';
                    break;
                case 'habit':
                    window.location.href = '/';
                    break;
                case 'stats':
                    window.location.href = '/pages/dashboard.html';
                    break;
                case 'pet':
                    window.location.href = '/#pet';
                    break;
                case 'logs':
                    // 当前页面，不需要跳转
                    break;
                case 'help':
                    window.location.href = '/';
                    break;
            }
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadLogs();
        }

        // 加载日志
        async function loadLogs() {
            const content = document.getElementById('logContent');
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                const params = {
                    page: currentPage,
                    pageSize: 20
                };

                const action = document.getElementById('actionFilter').value;
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                if (action) params.action = action;
                if (startDate) params.start_date = startDate;
                if (endDate) params.end_date = endDate;

                let response;
                if (currentTab === 'system') {
                    response = await API.logs.getSystemLogs(params);
                } else {
                    response = await API.logs.getLoginLogs(params);
                }

                const data = response.data;
                totalPages = data.pagination.totalPages;

                if (data.list.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <p>暂无日志记录</p>
                        </div>
                    `;
                } else {
                    content.innerHTML = data.list.map(log => `
                        <div class="log-item">
                            <span class="log-time">${formatDate(log.created_at)}</span>
                            <span class="log-type ${getLogType(log.action)}">${formatAction(log.action)}</span>
                            <span class="log-user">${log.username || '系统'}</span>
                            <span class="log-content">${formatContent(log)}</span>
                            <span class="log-time">${log.ip_address || '-'}</span>
                        </div>
                    `).join('');
                }

                renderPagination();

            } catch (error) {
                console.error('加载日志失败:', error);
                content.innerHTML = '<div class="empty-state"><p>加载失败，请重试</p></div>';
            }
        }

        // 格式化日期（按北京时间显示）
        function formatDate(dateStr) {
            // 解析日期字符串
            const date = new Date(dateStr);
            // 转换为北京时间（UTC+8）
            const beijingTime = new Date(date.getTime() + 8 * 60 * 60 * 1000);
            return beijingTime.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'UTC'
            });
        }

        // 获取日志类型样式
        function getLogType(action) {
            if (action.includes('create')) return 'create';
            if (action.includes('update')) return 'update';
            if (action.includes('delete')) return 'delete';
            if (action.includes('login')) return 'login';
            if (action.includes('checkin')) return 'checkin';
            return '';
        }

        // 格式化操作名称
        function formatAction(action) {
            const actions = {
                'create_habit': '创建习惯',
                'update_habit': '更新习惯',
                'delete_habit': '删除习惯',
                'checkin': '打卡',
                'login': '登录',
                'logout': '登出',
                'register': '注册'
            };
            return actions[action] || action;
        }

        // 格式化内容
        function formatContent(log) {
            if (currentTab === 'login') {
                return log.status === 'success' ? '登录成功' : `登录失败: ${log.fail_reason || ''}`;
            }
            return log.new_value || '-';
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span>...</span>`;
                }
            }

            html += `
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;

            pagination.innerHTML = html;
        }

        // 跳转页面
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadLogs();
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('actionFilter').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            currentPage = 1;
            loadLogs();
        }

        // 用户菜单切换（placeholder function)
        function toggleUserMenu() {
            // 用户菜单功能可以在这里实现
            console.log('Toggle user menu');
        }

        // 页面加载时加载日志
        document.addEventListener('DOMContentLoaded', loadLogs);
    </script>
</body>
</html>
